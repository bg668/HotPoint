<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>注册 - 信息收集结果管理平台</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="auth-wrap">
      <div class="card auth-card">
        <div class="card-title">注册新用户（需邀请码）</div>
        <div class="auth-body">
          <input id="username" placeholder="用户名" />
          <input id="password" type="password" placeholder="密码（至少6位）" />
          <input id="inviteCode" placeholder="邀请码" />
          <button id="registerBtn" class="btn">注册</button>
          <div id="msg" class="small"></div>
          <div class="small">已有账号？<a href="/login">去登录</a></div>
        </div>
      </div>
    </div>
    <script src="./auth.js"></script>
  </body>
</html>
